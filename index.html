<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拉马车 - 棋牌对战</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="game-header">
      <div class="header-left">
        <div class="game-title">拉马车</div>
        <div class="game-time">
          <span class="time-label">游戏时间：</span>
          <span id="gameTime" class="time-value">00:00</span>
        </div>
      </div>
      <div class="header-right">
        <button id="newGameBtn" class="btn btn-primary">新游戏</button>
      </div>
    </header>

    <main class="game-container">
      <section class="player-section ai-section">
        <div class="player-info">
          <div class="player-avatar ai-avatar">
            <div class="avatar-icon">🤖</div>
          </div>
          <div class="player-details">
            <div class="player-name">电脑</div>
            <div class="player-stats">
              <span class="stat-item">
                <span class="stat-label">得分：</span>
                <span id="aiScore" class="stat-value">0</span>
              </span>
              <span class="stat-item">
                <span class="stat-label">剩余：</span>
                <span id="aiCards" class="stat-value">27</span>
              </span>
            </div>
          </div>
        </div>
        <div class="deck-container ai-deck-container">
          <div id="aiDeck" class="card-deck">
            <div class="card-back">
              <div class="card-pattern"></div>
            </div>
            <div class="deck-count" id="aiDeckCount">27</div>
          </div>
        </div>
      </section>

      <section class="play-area">
        <div class="play-area-header">
          <div class="current-turn-indicator">
            <span id="currentTurnText" class="turn-text">轮到你出牌</span>
          </div>
          <div class="played-cards-info">
            <span class="played-label">已出牌：</span>
            <span id="playedCardsCount" class="played-count">0</span>
          </div>
        </div>
        
        <div id="playedCardsContainer" class="played-cards-container">
          <div class="played-cards-placeholder">点击下方牌堆开始出牌</div>
        </div>
      </section>

      <section class="player-section player-section-bottom">
        <div class="deck-container player-deck-container">
          <div id="playerDeck" class="card-deck clickable-deck">
            <div class="card-back">
              <div class="card-pattern"></div>
            </div>
            <div class="deck-count" id="playerDeckCount">27</div>
          </div>
        </div>
        
        <div class="player-info player-info-bottom">
          <div class="player-avatar player-avatar-bottom">
            <div class="avatar-icon">👤</div>
          </div>
          <div class="player-details">
            <div class="player-name">你</div>
            <div class="player-stats">
              <span class="stat-item">
                <span class="stat-label">得分：</span>
                <span id="playerScore" class="stat-value">0</span>
              </span>
              <span class="stat-item">
                <span class="stat-label">剩余：</span>
                <span id="playerCards" class="stat-value">27</span>
              </span>
            </div>
          </div>
          
          <div class="auto-play-toggle">
            <label class="toggle-container">
              <input type="checkbox" id="autoPlayToggle" class="toggle-input">
              <span class="toggle-slider"></span>
              <span class="toggle-label">自动出牌</span>
            </label>
          </div>
        </div>
      </section>
    </main>

    <div id="gameOverModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="gameResultTitle">游戏结束</h2>
        </div>
        <div class="modal-body">
          <div class="result-summary">
            <div id="resultIcon" class="result-icon">🏆</div>
            <div id="resultText" class="result-text">恭喜你获胜！</div>
          </div>
          
          <div class="result-stats">
            <div class="stat-row">
              <span class="stat-row-label">游戏时间：</span>
              <span id="finalGameTime" class="stat-row-value">00:00</span>
            </div>
            <div class="stat-row">
              <span class="stat-row-label">你的得分：</span>
              <span id="finalPlayerScore" class="stat-row-value">0</span>
            </div>
            <div class="stat-row">
              <span class="stat-row-label">电脑得分：</span>
              <span id="finalAiScore" class="stat-row-value">0</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="playAgainBtn" class="btn btn-primary btn-large">再来一局</button>
        </div>
      </div>
    </div>

    <div id="actionMessage" class="action-message hidden"></div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
